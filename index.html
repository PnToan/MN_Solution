<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MN_Solution</title>

  <!-- =========================================================
       01. APP CONFIG META
       ========================================================= -->
  <meta name="app-name" content="MN_Solution" />
  <meta name="app-version" content="0.1.0" />
  <meta name="app-mode" content="offline" />

  <!-- =========================================================
       02. THEME CSS
       ========================================================= -->
  <link rel="stylesheet" href="./ui/themes/theme-sketchup.css" />

  <!-- =========================================================
       03. LAYOUT CSS
       ========================================================= -->
  <link rel="stylesheet" href="./ui/layout/topbar.css" />
  <link rel="stylesheet" href="./ui/layout/library-bar.css" />
  <link rel="stylesheet" href="./ui/layout/left-toolbar.css" />
  <link rel="stylesheet" href="./ui/layout/canvas-area.css" />
  <link rel="stylesheet" href="./ui/layout/bottom-params.css" />
  <link rel="stylesheet" href="./ui/layout/right-panel.css" />

  <!-- =========================================================
       04. COMPONENT CSS
       ========================================================= -->
  <link rel="stylesheet" href="./ui/components/button.css" />
  <link rel="stylesheet" href="./ui/components/input.css" />
  <link rel="stylesheet" href="./ui/components/panel.css" />
  <link rel="stylesheet" href="./ui/components/tooltip.css" />
</head>

<body>
  <!-- =========================================================
       01. TOOLTIP DÙNG CHUNG
       ========================================================= -->
  <div id="toolTooltip" class="tool-tooltip"></div>

  <!-- =========================================================
       02. APP ROOT
       ========================================================= -->
  <div id="mnApp" class="mn-app">

    <!-- =======================================================
         03. TOP BAR
         ======================================================= -->
    <header class="mn-topbar">
      <div class="mn-brand">
        <div class="mn-brand-title">MN_Solution</div>
        <div class="mn-brand-subtitle">Offline CAD / DAC Workspace</div>
      </div>

      <div class="mn-top-actions">
        <button class="mn-btn" id="btnNew">Tạo mới</button>
        <button class="mn-btn" id="btnOpen">Mở file</button>
        <button class="mn-btn" id="btnSave">Lưu offline</button>
        <button class="mn-btn mn-btn-primary" id="btnExport">Xuất file</button>
      </div>
    </header>

    <!-- =======================================================
         04. LIBRARY BAR
         ======================================================= -->
    <nav class="mn-library-bar">
      <div class="mn-library-tabs">
        <button class="mn-library-tab" data-library-main="library">
          Thư viện
        </button>

        <button class="mn-library-category" data-library-category="frame">
          Khung
        </button>

        <button class="mn-library-category" data-library-category="door">
          Cánh
        </button>

        <button class="mn-library-category" data-library-category="box">
          Hộc
        </button>

        <button class="mn-library-category" data-library-category="panel">
          Tấm
        </button>
      </div>

      <div class="mn-library-subtabs">
        <button class="mn-library-item" data-parent="frame" data-library="wardrobe">
          Quần áo
        </button>

        <button class="mn-library-item" data-parent="frame" data-library="lower-kitchen">
          Bếp dưới
        </button>

        <button class="mn-library-item" data-parent="frame" data-library="upper-kitchen">
          Bếp trên
        </button>

        <button class="mn-library-item" data-parent="door" data-library="single-door">
          Đơn
        </button>

        <button class="mn-library-item" data-parent="door" data-library="double-door">
          Đôi
        </button>

        <button class="mn-library-item" data-parent="door" data-library="drawer-face">
          Mặt Hộc
        </button>

        <button class="mn-library-item" data-parent="box" data-library="single-drawer">
          Hộc đơn
        </button>

        <button class="mn-library-item" data-parent="box" data-library="double-drawer">
          Hộc đôi
        </button>

        <button class="mn-library-item" data-parent="panel" data-library="vertical-panel">
          Tấm đứng
        </button>

        <button class="mn-library-item" data-parent="panel" data-library="horizontal-panel">
          Tấm nằm
        </button>
      </div>
    </nav>

    <!-- =======================================================
         05. LEFT TOOLBAR
         ======================================================= -->
    <aside class="mn-left-toolbar">

      <div class="mn-tool-group">
        <button class="mn-tool-btn active" data-tool="select" data-tooltip="Chọn">
          <img src="./icons/toolbar/select.svg" alt="Chọn" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-tool="line" data-tooltip="Line">
          <img src="./icons/toolbar/line.svg" alt="Line" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-tool="rect" data-tooltip="Khung">
          <img src="./icons/toolbar/rect.svg" alt="Khung" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-tool="panel" data-tooltip="Vẽ Tấm">
          <img src="./icons/toolbar/panel.svg" alt="Vẽ Tấm" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-tool="move" data-tooltip="Di chuyển">
          <img src="./icons/toolbar/move.svg" alt="Di chuyển" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-tool="offset" data-tooltip="Offset">
          <img src="./icons/toolbar/offset.svg" alt="Offset" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-tool="measure" data-tooltip="Đo">
          <img src="./icons/toolbar/measure.svg" alt="Đo" class="mn-tool-icon" />
        </button>
      </div>

      <div class="mn-tool-separator"></div>

      <div class="mn-tool-group">
        <button class="mn-tool-btn" data-action="copy" data-tooltip="Copy">
          <img src="./icons/toolbar/copy.svg" alt="Copy" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-action="delete" data-tooltip="Xóa">
          <img src="./icons/toolbar/delete.svg" alt="Xóa" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-action="group" data-tooltip="Group">
          <img src="./icons/toolbar/group.svg" alt="Group" class="mn-tool-icon" />
        </button>

        <button class="mn-tool-btn" data-action="ungroup" data-tooltip="Rã Group">
          <img src="./icons/toolbar/ungroup.svg" alt="Rã Group" class="mn-tool-icon" />
        </button>
      </div>
    </aside>

    <!-- =======================================================
         06. CANVAS AREA
         ======================================================= -->
    <main class="mn-canvas-area">
      <canvas id="drawCanvas" class="mn-draw-canvas"></canvas>

      <div class="mn-mini-3d-preview" id="mini3dPreview">
        <div class="mn-mini-3d-title">3D PREVIEW</div>

        <div class="mn-mini-3d-box">
          <canvas id="mini3dCanvas" class="mn-mini-3d-canvas"></canvas>
        </div>
      </div>

      <div class="mn-quick-view-bar" id="quickViewBar">
        <button class="mn-quick-view-btn active" data-view="front">Trước</button>
        <button class="mn-quick-view-btn" data-view="back">Sau</button>
        <button class="mn-quick-view-btn" data-view="left">Trái</button>
        <button class="mn-quick-view-btn" data-view="right">Phải</button>
        <button class="mn-quick-view-btn" data-view="top">Trên</button>
        <button class="mn-quick-view-btn" data-view="bottom">Dưới</button>
      </div>

      <div class="mn-axis-widget" id="axisWidget" title="Kéo để xoay 3D Preview, double click để reset">
        <div class="mn-joystick-outer">
          <div class="mn-joystick-inner">
            <span class="mn-joystick-label">3D</span>
          </div>
        </div>
      </div>

      <div id="viewportInfo" class="mn-viewport-info">
        Tool: Chọn | X: 0 | Y: 0 | Zoom: 100%
      </div>
    </main>

    <!-- =======================================================
         07. BOTTOM PARAMETER BAR
         ======================================================= -->
    <section class="mn-bottom-params">
      <div class="mn-bottom-param-group">
        <label class="mn-bottom-param-label" for="inputWidthBottom">Rộng</label>
        <input class="mn-bottom-param-input" id="inputWidthBottom" type="number" value="3000" />
      </div>

      <div class="mn-bottom-param-group">
        <label class="mn-bottom-param-label" for="inputDepthBottom">Sâu</label>
        <input class="mn-bottom-param-input" id="inputDepthBottom" type="number" value="100" />
      </div>

      <div class="mn-bottom-param-group">
        <label class="mn-bottom-param-label" for="inputThicknessBottom">Cao</label>
        <input class="mn-bottom-param-input" id="inputThicknessBottom" type="number" value="2650" />
      </div>

      <div class="mn-bottom-param-group">
        <label class="mn-bottom-param-label" for="inputUnitBottom">Đơn vị</label>
        <select class="mn-bottom-param-input" id="inputUnitBottom">
          <option value="mm">mm</option>
          <option value="cm">cm</option>
          <option value="m">m</option>
        </select>
      </div>

      <div class="mn-bottom-param-status" id="bottomStatus">
        Sẵn sàng
      </div>
    </section>

  <!-- =========================================================
       08. CORE JS
       ========================================================= -->
  <script src="./core/constants.js"></script>
  <script src="./core/app-state.js"></script>
  <script src="./core/storage.js"></script>
  <script src="./core/units.js"></script>
  <script src="./core/math.js"></script>
  <script src="./core/event-bus.js"></script>
  <script src="./core/module-loader.js"></script>

  <!-- =========================================================
       09. CANVAS JS
       ========================================================= -->
  <script src="./scripts/canvas/canvas-init.js"></script>
  <script src="./scripts/canvas/canvas-grid.js"></script>
  <script src="./scripts/canvas/canvas-view.js"></script>
  <script src="./scripts/canvas/canvas-zoom.js"></script>
  <script src="./scripts/canvas/canvas-pan.js"></script>

  <!-- =========================================================
       10. MANAGER JS
       ========================================================= -->
  <script src="./scripts/managers/tool-manager.js"></script>
  <script src="./scripts/managers/mouse-manager.js"></script>
  <script src="./scripts/managers/layer-manager.js"></script>
  <script src="./scripts/managers/object-manager.js"></script>
  <script src="./scripts/managers/history-manager.js"></script>
  <script src="./scripts/managers/shortcut-manager.js"></script>

  <!-- =========================================================
       11. TOOL JS
       ========================================================= -->
  <script src="./scripts/tools/tool-move.js"></script>
  <script src="./scripts/tools/tool-panel.js"></script>

  <!-- =========================================================
       12. APP INIT
       ========================================================= -->
  <script src="./core/app-init.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
<div id="app"></div>
</html>
